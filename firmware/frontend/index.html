<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roaster Monitor</title>
</head>

<body>
    <div class="main-area">
        <div style="position: relative; height: 100%; width: 100%;">
            <canvas id="plot_temperature"></canvas>
        </div>
        <div class="side-panel">
            <div id="temp-panel">
                <button class="button temp-button" id="temperature-display-bt">BT: ----.-℃</button>
                <button class="button temp-button" id="temperature-display-et">ET: ----.-℃</button>
                <button class="button temp-button" id="temperature-display-delta-bt">ΔBT: ----.-℃</button>
                <button class="button temp-button" id="temperature-display-delta-et">ΔET: ----.-℃</button>
            </div>
            <div id='controller'>
                <button class="button control-button" value="start">Start</button>
                <button class="button control-button" value="stop">Stop</button>
                <button class="button control-button" value="reset">Reset</button>
                <button class="button control-button" value="export">Export</button>
            </div>
        </div>
    </div>

    <!-- App entry point -->
    <script type="module" src="/src/main.js" defer></script>
</body>
</html>
